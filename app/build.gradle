plugins {
    alias(libs.plugins.android.application)
    // Sửa lại dòng này nếu bạn dùng Version Catalog (libs)
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.example.englishlearningapp'
    compileSdk 34 // Khuyên dùng 34 hoặc 35, 36 hiện tại là bản Preview quá mới

    defaultConfig {
        applicationId "com.example.englishlearningapp"
        minSdk 24 // Nên để 24 để hỗ trợ nhiều máy hơn
        targetSdk 34
        // ... giữ nguyên ...
    }
}

dependencies {
    // Xóa dòng trùng lặp: implementation libs.material
    // Chỉ giữ lại một dòng Material mới nhất
    implementation 'com.google.android.material:material:1.12.0'

    // Firebase (Giữ nguyên cụm này là đúng)
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'

    // Google Sign In (Cập nhật bản mới)
    implementation 'com.google.android.gms:play-services-auth:21.2.0'
}